<!DOCTYPE html>
<html>
<head>
<title>Children's Church Quiz</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="quiz-container">

<h2>John 6 Quiz</h2>

<p>Student: {{ name }} | Age: {{ age }}</p>

<div class="progress-bar">
<div class="progress-fill"></div>
</div>

{% for q in questions %}

<p><b>{{ loop.index }}. {{ q.question }}</b></p>

{% for choice in q.choices %}

<label class="option">
<input type="radio" name="q{{ loop.index }}">
{{ choice }}
</label>

{% endfor %}

<p><i>Answer: {{ q.answer }}</i></p>

<br>

{% endfor %}

<button>Submit</button>

</div>

</body>
</html>
