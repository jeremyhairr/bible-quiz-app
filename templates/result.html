<!DOCTYPE html>
<html>
<head>
    <title>Bible Quiz</title>
</head>
<body>

<h1>Hello {{ name }}!</h1>

<p>Age: {{ age }}</p>

<h2>Bible Quiz Questions</h2>

{% for q in questions %}
    <div style="margin-bottom:20px;">
        <p><strong>{{ q.question }}</strong></p>

        <form>
            <input type="radio" name="answer{{ loop.index }}"> A<br>
            <input type="radio" name="answer{{ loop.index }}"> B<br>
            <input type="radio" name="answer{{ loop.index }}"> C<br>
            <input type="radio" name="answer{{ loop.index }}"> D<br>
        </form>

        <p><em>Answer:</em> {{ q.answer }}</p>
    </div>
{% endfor %}

<br>
<a href="/">Back to Start</a>

</body>
</html>
