<!DOCTYPE html>
<html>
<head>
<title>Bible Quiz</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="quiz-container">

<h1>Bible Quiz</h1>

<h2>{{ questions[0].question }}</h2>

<form method="POST">

<label class="option">
<input type="radio" name="answer" value="A"> Option A
</label>

<label class="option">
<input type="radio" name="answer" value="B"> Option B
</label>

<label class="option">
<input type="radio" name="answer" value="C"> Option C
</label>

<label class="option">
<input type="radio" name="answer" value="D"> Option D
</label>

<button type="submit">Submit Answer</button>

</form>

</div>

</body>
</html>
